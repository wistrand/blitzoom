<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>All DNA 8-mers — BlitZoom</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 1rem;
    }
    h1 { font-size: 1.5rem; margin-bottom: 0.25rem; }
    .subtitle { color: #8b949e; margin-bottom: 1rem; font-size: 0.9rem; }
    bz-graph {
      width: 100%;
      max-width: 1200px;
      height: 700px;
      border: 1px solid #30363d;
      border-radius: 12px;
      overflow: hidden;
    }
    .panel-row {
      display: flex;
      gap: 12px;
      align-items: flex-start;
      width: 100%;
      max-width: 1200px;
      margin-top: 12px;
    }
    .panel-row bz-compass {
      flex-shrink: 0;
      width: 240px;
      height: 240px;
      background: #111118;
      border: 1px solid #30363d;
      border-radius: 8px;
    }
    .panel-row bz-controls {
      flex: 1;
      min-width: 0;
      padding: 12px;
      background: #111118;
      border: 1px solid #30363d;
      border-radius: 8px;
    }
  </style>
</head>
<body>
  <header style="padding:10px 16px;border-bottom:1px solid rgba(255,255,255,0.08);font:11px 'JetBrains Mono',monospace;align-self:stretch;margin:-1rem -1rem 1rem">
    <a href="../index.html" style="color:#7c6af7;text-decoration:none">← BlitZoom</a>
  </header>
  <h1>All DNA 8-mers (4<sup>8</sup> = 65,536)</h1>
  <p class="subtitle">Every possible 8-base DNA sequence, organized by GC content, palindromicity, and restriction-site membership.</p>
  <script type="module" src="../blitzoom.js"></script>
  <script type="module" src="../bz-compass.js"></script>
  <script type="module" src="../bz-controls.js"></script>

  <bz-graph id="g" level="6" legend label-props="label" color-by="gcCategory"
            strengths="gcCategory:6,palindrome:5,enzyme:5" heatmap="density"
            label-font='{"topHL":18,"top":11,"bottomHL":11,"bottom":10}'>
  </bz-graph>
  <div class="panel-row">
    <bz-compass for="g"></bz-compass>
    <bz-controls for="g" checkboxes></bz-controls>
  </div>

  <script type="module">

    // ─── k-mer enumeration ───────────────────────────────────────────────────
    const K = 8;
    const BASES = 'ACGT';

    function toKmer(i) {
      let s = '';
      for (let j = 0; j < K; j++) {
        s = BASES[i & 3] + s;
        i >>= 2;
      }
      return s;
    }

    const COMPLEMENT = { A: 'T', T: 'A', C: 'G', G: 'C' };
    function reverseComplement(kmer) {
      let rc = '';
      for (let i = kmer.length - 1; i >= 0; i--) rc += COMPLEMENT[kmer[i]];
      return rc;
    }

    function gcCount(kmer) {
      let c = 0;
      for (const b of kmer) if (b === 'G' || b === 'C') c++;
      return c;
    }

    function longestRun(kmer) {
      let max = 1, run = 1;
      for (let i = 1; i < kmer.length; i++) {
        if (kmer[i] === kmer[i - 1]) { run++; if (run > max) max = run; }
        else run = 1;
      }
      return max;
    }

    // Common restriction enzyme recognition sites (6-bp). For each k-mer we
    // check whether it CONTAINS a known site as a substring; many enzymes
    // recognize palindromes which makes them visually distinct.
    const ENZYMES = [
      ['EcoRI',   'GAATTC'],
      ['BamHI',   'GGATCC'],
      ['HindIII', 'AAGCTT'],
      ['NotI',    'GCGGCCGC'],   // 8-bp, exact match for k=8
      ['SmaI',    'CCCGGG'],
      ['PstI',    'CTGCAG'],
      ['SacI',    'GAGCTC'],
      ['SalI',    'GTCGAC'],
      ['XhoI',    'CTCGAG'],
      ['XbaI',    'TCTAGA'],
    ];
    function findEnzyme(kmer) {
      for (const [name, site] of ENZYMES) {
        if (kmer.indexOf(site) !== -1) return name;
      }
      return 'none';
    }

    function gcCategory(gc) {
      if (gc <= 2) return 'low';
      if (gc <= 5) return 'mid';
      return 'high';
    }

    // Build the full node list — 65,536 8-mers, ~120 ms on a modern machine.
    const nodes = [];
    const total = 1 << (2 * K);
    for (let i = 0; i < total; i++) {
      const kmer = toKmer(i);
      const gc = gcCount(kmer);
      nodes.push({
        id: kmer,
        label: kmer,
        gc,                                                 // numeric — auto-binned
        gcCategory: gcCategory(gc),                         // 'low' | 'mid' | 'high'
        palindrome: kmer === reverseComplement(kmer) ? 'palindrome' : 'asymmetric',
        startBase: kmer[0],
        endBase: kmer[K - 1],
        longestRun: longestRun(kmer),
        enzyme: findEnzyme(kmer),
      });
    }

    // ─── Load into the static <bz-graph> ─────────────────────────────────────
    const g = document.getElementById('g');
    await g.ready;
    await g.addNodes(nodes, [], { animate: false });
  </script>
</body>
</html>
