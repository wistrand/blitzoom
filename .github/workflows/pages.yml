name: Build and deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# Force JavaScript actions (checkout, upload-artifact, deploy-pages, etc.)
# to run on Node.js 24 instead of the Node 20 declared in their action.yml
# manifests. GitHub is removing Node 20 from runners on 2026-09-16; this env
# variable is the official opt-in until those actions publish Node 24-native
# major releases.
#
# Rant: setting this env variable does NOT silence the deprecation warning.
# Instead, GitHub helpfully swaps it for a *different* warning that says
# "this action targets Node 20 but is being forced to run on Node 24" — i.e.
# "you are using the workaround we told you to use". On every single run.
# Forever, until the upstream action authors (also GitHub) publish new
# versions that declare Node 24 in their own action.yml and we bump the pin.
# This is the official escape hatch; using it correctly produces noise that
# trains everyone to ignore CI warnings, which is the actual harm here.
# A 30-second UX review of "should we still warn after the user opts in"
# would have caught this. Nothing to do but wait for actions/checkout@v5
# (etc.) to ship and then bump pins + delete this block.
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Run pipeline + import-cycle tests
        run: deno task test

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Build bundle
        run: deno task bundle

      - name: Build skill zip
        run: deno task skill:zip

      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  # When this deploy job calls actions/deploy-pages, GitHub *also* fires a
  # second workflow run in the Actions tab called `pages-build-deployment`.
  # That's GitHub's internal Pages publishing infrastructure, not the old
  # "Deploy from a branch" mode. It can't be hidden, disabled, or prevented
  # by any YAML you write. The two runs are sequential — yours uploads the
  # artifact, then `pages-build-deployment` serves it from the CDN.
  #
  # Known annoyance since October 2022 (~3.5 years as of writing). Dozens of
  # community discussion threads (#36555, #37914, #102334, #43116, #158055,
  # quarto-dev #5810, etc.). GitHub's stance has been consistent: "working
  # as intended", will not be fixed. Maintainers since 2022:
  #   "the only guarantee is that the build/deployment is triggered after a
  #    push on your selected branch. There are no other guarantees being
  #    made with regards to workflow orchestration."
  # The standard advice given to confused users is "migrate to custom
  # workflows so you only have one" — which is exactly what they already
  # did, and is what triggers the duplicate. Cruel.
  #
  # Bottom line: ignore the second `pages-build-deployment` run in the
  # Actions tab. It's expected. Both runs succeeding = site deployed.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
